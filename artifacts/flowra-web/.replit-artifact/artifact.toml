kind = "web"
previewPath = "/"
title = "Flowra Web"
version = "1.0.0"
id = "artifacts/flowra-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21140

[services.development]
run = "pnpm --filter @workspace/flowra-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flowra-web", "run", "build" ]
publicDir = "artifacts/flowra-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21140"
BASE_PATH = "/"
